<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{baseui::mybaselayout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>

	<section>

		<div class="container">

			<div class="row">


				<div class="col-md-10 offset-md-1">

					<div class="card my-2">
						<div class="card-body">

							<img th:src="@{'/postfiles/'+${post.id}+'/'+${post.postImageName}}">
							<h5 class="card-title text-center" th:text=${post.title}>Card
								title</h5>
							<p class="card-text" th:utext=${post.content}></p>




							<div class="card">
								<div class="card-body"
									th:text="${#temporals.format(post.createdOn,'dd-MMM-yyyy HH:mm a')}">
									This is some text within a card body.</div>
							</div>
						</div>
					</div>


				</div>

			</div>


		</div>





	</section>

</body>
</html>
