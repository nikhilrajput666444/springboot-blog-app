<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{baseui::mybaselayout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>

	<section>

		<div class="container">

			<div class="row">


				<div class="col-md-6 offset-md-3">

					<h1>Login</h1>
					<div class="card">
						<div class="card-body">

							<!-- form started -->

							<form method="post" th:action="@{/login}">


								<div class="mb-3">
									<label for="pt" class="form-label">Email</label> <input name="username"
										type="text" class="form-control" id="pt"
										aria-describedby="emailHelp">
									<div class="text-danger">
										<span></span>
									</div>
								</div>


								<div class="mb-3">
									<label for="pt" class="form-label">Password</label> <input
										type="password" class="form-control" id="pt" name="password"
										aria-describedby="emailHelp">
									<div class="text-danger">
										<span></span>
									</div>
								</div>






								<button type="submit" class="btn btn-primary">Login</button>
							</form>

							<!-- form ended -->

							<div class="alert alert-success" th:if="${msg}" th:text="${msg}"
								role="alert"></div>

							<div class="alert alert-danger" th:if="${error}"
								th:text="${error}" role="alert"></div>

						</div>
					</div>


				</div>

			</div>


		</div>





	</section>

</body>
</html>
