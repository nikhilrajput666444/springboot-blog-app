<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{baseui::mybaselayout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>

	<section>

		<div class="container">

			<div class="row">


				<div class="col-md-10 offset-md-1">

					<h1>Update Blog Post</h1>
					<div class="card">
						<div class="card-body">

							<!-- form started -->

							<form th:action="@{/post/updatepost}" method="post"
								enctype="multipart/form-data" th:object="${post}">


                               <!--   post id hidden paramter -->
                                 <input type="hidden" th:field="*{id}"/>                                 
                                <!--  post imagename hidden  -->
                                  <input type="hidden" th:field="*{postImageName}"/> 

								<div class="mb-3">
									<label for="pt" class="form-label">Post Title</label> <input
										type="text" th:field="*{title}" class="form-control" id="pt"
										aria-describedby="emailHelp">
									<div class="text-danger" th:if="${#fields.hasErrors('title')}">
										<span th:errors="*{title}"></span>
									</div>
								</div>


                                  <div class="form-group">
                                  
                                  <select class="form-control" aria-label="Default select example"   th:field="*{categoryId}">
									 <option value=""  >--SELECT CATEGORY--</option>
									<option th:each="cat : ${categories}"  th:value="${cat.id}" th:text="${cat.name}"></option>
									
								</select>
                                	<div class="text-danger" th:if="${#fields.hasErrors('categoryId')}">
										<span th:errors="*{categoryId}"></span>
									</div>
                                  </div>
								


								<div class="input-group mb-3">
								<img th:src="@{'/postfiles/'+*{id}+'/'+*{postImageName}}" width="80px" height="80px">
									<input type="file" class="form-control-file" name="image"
										id="inputGroupFile02">
										<label for="inputGroupFile02">Upload Post Banner image</label>

								</div>

								<div class="form-floating">
									<label for="floatingTextarea">Short Description</label>
									<textarea class="form-control" rows="3" th:field="*{shortDesc}"
										placeholder="Leave a comment here" id="shortDescEditor"></textarea>
									<div class="text-danger"
										th:if="${#fields.hasErrors('shortDesc')}">
										<span th:errors="*{shortDesc}"></span>
									</div>
								</div>


								<div class="form-floating mb-3">
									<label for="floatingTextarea">Content</label>
									<textarea class="form-control" rows="10" th:field="*{content}"
										placeholder="Leave a comment here" id="contentEditor"></textarea>

									<div class="text-danger"
										th:if="${#fields.hasErrors('content')}">
										<span th:errors="*{content}"></span>
									</div>
								</div>


								<button type="submit" class="btn btn-primary">update</button>
							</form>

							<!-- form ended -->

							<div class="alert alert-success" th:if="${msg}" th:text="${msg}"
								role="alert"></div>

							<div class="alert alert-danger" th:if="${error}"
								th:text="${error}" role="alert"></div>

						</div>
					</div>


				</div>

			</div>


		</div>





	</section>

</body>
</html>
